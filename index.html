<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Consultor de CNPJ</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        .container { max-width: 600px; margin: auto; }
        .resultado { margin-top: 20px; border: 1px solid #ddd; padding: 15px; display: none; }
        input, button { padding: 10px; margin: 5px 0; }
    </style>
</head>
<body>

<div class="container">
    <h2>Consulta de CNPJ</h2>
    <input type="text" id="cnpjInput" placeholder="Digite apenas números">
    <button onclick="buscarCNPJ()">Consultar</button>
    <button onclick="gerarPDF()" id="btnPdf" style="display:none;">Gerar PDF</button>

    <div id="resultado" class="resultado">
        </div>
</div>

<script>
    async function buscarCNPJ() {
        const cnpj = document.getElementById('cnpjInput').value.replace(/\D/g, '');
        if (cnpj.length !== 14) return alert("CNPJ inválido!");

        try {
            const response = await fetch(`https://brasilapi.com.br/api/cnpj/v1/${cnpj}`);
            const data = await response.json();

            if (data.message) throw new Error(data.message);

            exibirDados(data);
        } catch (error) {
            alert("Erro ao buscar CNPJ: " + error.message);
        }
    }

    function exibirDados(data) {
        const div = document.getElementById('resultado');
        div.style.display = 'block';
        document.getElementById('btnPdf').style.display = 'inline-block';

        div.innerHTML = `
            <p><strong>Razão Social:</strong> ${data.razao_social}</p>
            <p><strong>Nome Fantasia:</strong> ${data.nome_fantasia || 'Não informado'}</p>
            <p><strong>Situação:</strong> ${data.descricao_situacao_cadastral}</p>
            <p><strong>Endereço:</strong> ${data.logradouro}, ${data.numero} - ${data.bairro}</p>
            <p><strong>Capital Social:</strong> R$ ${data.capital_social.toLocaleString('pt-BR')}</p>
        `;
        // Guardamos os dados globalmente para o PDF
        window.dadosEmpresa = data;
    }

    function gerarPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const d = window.dadosEmpresa;

        doc.text("Relatório de Consulta de CNPJ", 10, 10);
        doc.text(`Razão Social: ${d.razao_social}`, 10, 20);
        doc.text(`CNPJ: ${d.cnpj}`, 10, 30);
        doc.text(`Situação: ${d.descricao_situacao_cadastral}`, 10, 40);
        
        doc.save(`CNPJ_${d.cnpj}.pdf`);
    }
</script>

</body>
</html>
